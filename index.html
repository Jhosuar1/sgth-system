<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SGTH PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#020617,#0f172a);
  color:white;
}
.container { max-width:900px; margin:auto; padding:20px; }
.card {
  background: rgba(255,255,255,0.08);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
input { padding:8px; margin:5px; border-radius:6px; border:none; }
button {
  padding:8px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Ingresar</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<h2>Dashboard</h2>
<div id="stats"></div>
</div>

<div class="card">
<h2>Empleado</h2>
<input id="nombre" placeholder="Nombre">
<input id="cargo" placeholder="Cargo">
<input id="salario" placeholder="Salario">
<button onclick="crear()">Guardar</button>
</div>

<div class="card">
<h2>Lista</h2>
<div id="lista"></div>
</div>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://unlkizxltetrvaxgcidj.supabase.co",
  "PEGA_AQUI_TU_ANON_KEY"
);

async function login(){
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if(error) return alert("Error login");

  loginBox.style.display="none";
  app.style.display="block";

  cargar();
}

async function cargar(){
  const { data } = await supabase.from("empleados").select("*");

  stats.innerHTML = "Empleados: " + (data?.length || 0);

  lista.innerHTML="";
  data.forEach(e=>{
    lista.innerHTML += `
      <div>
        ${e.nombre} - ${e.cargo}
        <button onclick="del('${e.id}')">X</button>
      </div>
    `;
  });
}

async function crear(){
  await supabase.from("empleados").insert([{
    nombre:nombre.value,
    cargo:cargo.value,
    salario:salario.value
  }]);
  cargar();
}

async function del(id){
  await supabase.from("empleados").delete().eq("id",id);
  cargar();
}

</script>

</body>
</html>
